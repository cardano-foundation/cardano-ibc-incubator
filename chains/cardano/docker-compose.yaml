services:
  cardano-node:
    image: ${CARDANO_NODE_IMAGE:-ghcr.io/blinklabs-io/cardano-node:10.1.4-3}
    container_name: cardano-node
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./${CARDANO_RUNTIME_DIR:-devnet}:/runtime
    environment:
      - CARDANO_BLOCK_PRODUCER=${CARDANO_BLOCK_PRODUCER:-true}
      - CARDANO_CONFIG=/runtime/${CARDANO_NODE_CONFIG_FILE:-cardano-node.json}
      - CARDANO_DATABASE_PATH=/runtime/db
      - CARDANO_BIND_ADDR=0.0.0.0
      - CARDANO_PORT=3001
      - CARDANO_TOPOLOGY=/runtime/${CARDANO_TOPOLOGY_FILE:-topology.json}
      - CARDANO_SOCKET_PATH=/runtime/node.socket # used by cardano-node
      - CARDANO_NODE_SOCKET_PATH=/runtime/node.socket # used by cardano-cli
      - CARDANO_SHELLEY_KES_KEY=/runtime/kes.skey
      - CARDANO_SHELLEY_VRF_KEY=/runtime/vrf.skey
      - CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE=/runtime/opcert.cert
      - RESTORE_SNAPSHOT=false
    ports:
      - 3001:3001
    command: ["run"]
    networks:
      default:
        ipv4_address: 172.29.0.11

  cardano-node-spo2:
    image: ${CARDANO_NODE_IMAGE:-ghcr.io/blinklabs-io/cardano-node:10.1.4-3}
    container_name: cardano-node-spo2
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - cardano-node
    volumes:
      - ./${CARDANO_RUNTIME_DIR:-devnet}:/runtime
    environment:
      - CARDANO_BLOCK_PRODUCER=${CARDANO_BLOCK_PRODUCER:-true}
      - CARDANO_CONFIG=/runtime/${CARDANO_NODE_CONFIG_FILE:-cardano-node.json}
      - CARDANO_DATABASE_PATH=/runtime/spo2/db
      - CARDANO_BIND_ADDR=0.0.0.0
      - CARDANO_PORT=3001
      - CARDANO_TOPOLOGY=/runtime/topology-spo2.json
      - CARDANO_SOCKET_PATH=/runtime/spo2/node.socket
      - CARDANO_NODE_SOCKET_PATH=/runtime/spo2/node.socket
      - CARDANO_SHELLEY_KES_KEY=/runtime/spo2/kes.skey
      - CARDANO_SHELLEY_VRF_KEY=/runtime/spo2/vrf.skey
      - CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE=/runtime/spo2/opcert.cert
      - RESTORE_SNAPSHOT=false
    command: ["run"]
    networks:
      default:
        ipv4_address: 172.29.0.12

  cardano-node-spo3:
    image: ${CARDANO_NODE_IMAGE:-ghcr.io/blinklabs-io/cardano-node:10.1.4-3}
    container_name: cardano-node-spo3
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - cardano-node
    volumes:
      - ./${CARDANO_RUNTIME_DIR:-devnet}:/runtime
    environment:
      - CARDANO_BLOCK_PRODUCER=${CARDANO_BLOCK_PRODUCER:-true}
      - CARDANO_CONFIG=/runtime/${CARDANO_NODE_CONFIG_FILE:-cardano-node.json}
      - CARDANO_DATABASE_PATH=/runtime/spo3/db
      - CARDANO_BIND_ADDR=0.0.0.0
      - CARDANO_PORT=3001
      - CARDANO_TOPOLOGY=/runtime/topology-spo3.json
      - CARDANO_SOCKET_PATH=/runtime/spo3/node.socket
      - CARDANO_NODE_SOCKET_PATH=/runtime/spo3/node.socket
      - CARDANO_SHELLEY_KES_KEY=/runtime/spo3/kes.skey
      - CARDANO_SHELLEY_VRF_KEY=/runtime/spo3/vrf.skey
      - CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE=/runtime/spo3/opcert.cert
      - RESTORE_SNAPSHOT=false
    command: ["run"]
    networks:
      default:
        ipv4_address: 172.29.0.13

  cardano-node-ogmios:
    image: cardanosolutions/ogmios:v6.10.0
    user: "${UID:-1000}:${GID:-1000}"
    logging:
      driver: "json-file"
      options:
        max-size: "400k"
        max-file: "20"
    ports:
      - ${OGMIOS_PORT:-1337}:1337
    restart: on-failure
    depends_on:
      - cardano-node
    volumes:
      - ./${CARDANO_RUNTIME_DIR:-devnet}:/runtime
      - ./${CARDANO_RUNTIME_DIR:-devnet}/db:/db
    command:
      [
        "--node-config",
        "/runtime/${CARDANO_NODE_CONFIG_FILE:-cardano-node.json}",
        "--host",
        "0.0.0.0",
        "--node-socket",
        "/runtime/node.socket"
      ]

  kupo:
    image: cardanosolutions/kupo:v2.9.0
    user: "${UID:-1000}:${GID:-1000}"
    logging:
      driver: "json-file"
      options:
        max-size: "400k"
        max-file: "20"
    depends_on:
      - cardano-node
    ports:
      - ${KUPO_PORT:-1442}:1442
    command:
      [
        "--node-socket",
        "/runtime/node.socket",
        "--node-config",
        "/runtime/${CARDANO_NODE_CONFIG_FILE:-cardano-node.json}",
        "--since",
        "${KUPO_SINCE:-origin}",
        "--match",
        "${KUPO_MATCH:-*}",
        "--workdir",
        "/db",
        "--host",
        "0.0.0.0",
        "--port",
        "1442"
      ]
    volumes:
      - ./${CARDANO_RUNTIME_DIR:-devnet}:/runtime
      - ./kupo-db:/db

  postgres:
    image: postgres:15
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - POSTGRES_LOGGING=true
      - POSTGRES_DB_FILE=/run/secrets/postgres_db
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_USER_FILE=/run/secrets/postgres_user
    secrets:
      - postgres_password
      - postgres_user
      - postgres_db
    ports:
      - ${POSTGRES_PORT:-6432}:5432
    depends_on:
      - cardano-node
    volumes:
      - ./postgres:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      # Use pg_isready to check postgres is running. Substitute different
      # user `postgres` if you've setup differently to config/pgpass-mainnet
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ${POSTGRES_ARGS:--c maintenance_work_mem=1GB -c max_parallel_maintenance_workers=4}
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  yaci-store-postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=yaci_store
      - POSTGRES_USER=yaci
      - POSTGRES_PASSWORD=dbpass
    depends_on:
      - cardano-node
    volumes:
      - ./yaci-postgres:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U yaci -d yaci_store" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  bridge-history-postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=bridge_history
      - POSTGRES_USER=bridge
      - POSTGRES_PASSWORD=dbpass
    volumes:
      - ./bridge-history-postgres:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bridge -d bridge_history" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  yaci-store:
    image: bloxbean/yaci-store:2.0.0
    ports:
      - ${YACI_STORE_PORT:-8081}:8080
    depends_on:
      - cardano-node
      - yaci-store-postgres
    environment:
      - SPRING_CONFIG_ADDITIONAL_LOCATION=/app/config/application.properties
      - CARDANO_CHAIN_HOST=cardano-node
      - CARDANO_CHAIN_PORT=3001
      - CARDANO_CHAIN_NETWORK_MAGIC=${CARDANO_CHAIN_NETWORK_MAGIC:-42}
      - YACI_STORE_DB_HOST=yaci-store-postgres
      - YACI_STORE_DB_PORT=5432
      - YACI_STORE_DB_NAME=yaci_store
      - YACI_STORE_DB_USERNAME=yaci
      - YACI_STORE_DB_PASSWORD=dbpass
    volumes:
      - ./yaci/genesis:/app/genesis:ro
      - ./yaci/config:/app/config:ro
      - ./yaci/data:/app/data
      - ./yaci/logs:/app/logs
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  cardano-db-sync:
    image: ${CARDANO_DB_SYNC_IMAGE:-ghcr.io/blinklabs-io/cardano-db-sync:main@sha256:04b04848fb062e8993a39da863a87cb9863de1bc4cd3baf0a84b60a7b772d8f7}
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - RESTORE_RECREATE_DB=N
      - CARDANO_NODE_SOCKET_PATH=/opt/cardano/config/devnet/node.socket
      - NETWORK=devnet
    depends_on:
      - cardano-node
      - postgres
    secrets:
      - postgres_password
      - postgres_user
      - postgres_db
    volumes:
      - ./devnet:/opt/cardano/config/devnet
      - ./db-sync-data:/var/lib/cexplorer
      - ./db-sync-configuration:/configuration
      - ./db-sync-log-dir:/log-dir
    command:
      [
        "--config",
        "/devnet/db-sync-config.json"
      ]
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

networks:
  default:
    name: cardano_ibc_net
    ipam:
      config:
        - subnet: 172.29.0.0/24

secrets:
  postgres_db:
    file: ./config/secrets/postgres_db
  postgres_password:
    file: ./config/secrets/postgres_password
  postgres_user:
    file: ./config/secrets/postgres_user
