[[chains]]
id = 'cheqd-local'
type = 'CosmosSdk'
rpc_addr = 'http://127.0.0.1:27257'
grpc_addr = 'http://127.0.0.1:9690'
event_source = { mode = 'push', url = 'ws://127.0.0.1:27257/websocket', batch_delay = '200ms' }
rpc_timeout = '10s'
trusted_node = true
account_prefix = 'cheqd'
key_name = 'cheqd-local-relayer'
address_type = { derivation = 'cosmos' }
store_prefix = 'ibc'
default_gas = 5000000
max_gas = 15000000
gas_price = { price = 50, denom = 'ncheq' }
gas_multiplier = 1.8
max_msg_num = 20
max_tx_size = 209715
clock_drift = '20s'
max_block_time = '10s'
trusting_period = '10days'
memo_prefix = 'Caribic'
trust_threshold = { numerator = '1', denominator = '3' }
compat_mode = '0.38'
