name: Cardano Gateway Image

on:
  pull_request:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".github/workflows/gateway-image.yml"
      - "cardano/gateway/**"
      - "packages/cardano-ibc-planner/**"
      - "packages/cardano-ibc-trace-registry/**"
      - "packages/cardano-ibc-tx-builder/**"
      - "packages/cardano-ibc-tx-builder-runtime/**"
      - "proto-types/**"
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - ".dockerignore"
      - ".github/workflows/gateway-image.yml"
      - "cardano/gateway/**"
      - "packages/cardano-ibc-planner/**"
      - "packages/cardano-ibc-trace-registry/**"
      - "packages/cardano-ibc-tx-builder/**"
      - "packages/cardano-ibc-tx-builder-runtime/**"
      - "proto-types/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/cardano-gateway

jobs:
  gateway-image:
    name: Build and publish Gateway image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate semver tag
        if: github.ref_type == 'tag'
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Gateway release tags must use semver format, for example v0.1.0 or v0.1.0-rc.1."
            exit 1
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Cardano IBC Gateway
            org.opencontainers.image.description=Gateway service for Cardano IBC relayers

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cardano/gateway/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.ref_name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          notes_file="${RUNNER_TEMP}/gateway-release-notes.md"
          cat > "${notes_file}" <<EOF
          Published Cardano Gateway container image:

          - \`${IMAGE_NAME}:${IMAGE_TAG}\`
          - \`${IMAGE_NAME}@${IMAGE_DIGEST}\`

          Pull with:

          \`\`\`bash
          docker pull ${IMAGE_NAME}:${IMAGE_TAG}
          \`\`\`
          EOF

          if gh release view "${IMAGE_TAG}" >/dev/null 2>&1; then
            gh release edit "${IMAGE_TAG}" \
              --title "${IMAGE_TAG}" \
              --notes-file "${notes_file}"
          else
            gh release create "${IMAGE_TAG}" \
              --verify-tag \
              --title "${IMAGE_TAG}" \
              --notes-file "${notes_file}"
          fi
