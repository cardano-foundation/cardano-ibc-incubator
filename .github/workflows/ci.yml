name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  npm_config_audit: false
  npm_config_fund: false
  CARGO_TERM_COLOR: always

jobs:
  docs-branch-guard:
    name: Docs Branch Guard
    if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check docs-only changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t changed_files < <(
            gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --paginate \
              --jq '.[].filename'
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files found for docs branch PR ${PR_NUMBER}."
            exit 1
          fi

          non_docs_files=()
          for file in "${changed_files[@]}"; do
            case "${file}" in
              *.md|*.mdx|*.txt|*.rst|*.adoc|*.asciidoc|LICENSE|NOTICE|AUTHORS)
                ;;
              docs/*.png|docs/*.jpg|docs/*.jpeg|docs/*.gif|docs/*.webp|docs/*.svg)
                ;;
              *)
                non_docs_files+=("${file}")
                ;;
            esac
          done

          if [ "${#non_docs_files[@]}" -gt 0 ]; then
            echo "Branches named docs/... may only edit documentation files."
            printf 'Non-documentation file: %s\n' "${non_docs_files[@]}"
            exit 1
          fi

          printf 'Documentation file: %s\n' "${changed_files[@]}"

  repo-invariants:
    name: Repository Invariants
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check repo invariants
        run: node scripts/ci/check-repo-invariants.mjs

  quality-ratchets:
    name: Quality Ratchets
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check lint suppressions
        run: node scripts/ci/check-lint-suppressions.mjs

      - name: Check unused exports
        run: node scripts/ci/check-knip-ratchet.mjs

      - name: Check npm audit ratchet
        run: node scripts/ci/check-npm-audit-ratchet.mjs

  gateway:
    name: Cardano Gateway
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cardano/gateway/package-lock.json
            proto-types/package-lock.json
            packages/cardano-ibc-planner/package-lock.json
            packages/cardano-ibc-tx-builder/package-lock.json
            packages/cardano-ibc-trace-registry/package-lock.json
            packages/cardano-ibc-tx-builder-runtime/package-lock.json

      - name: Build proto types
        run: |
          npm ci --prefix proto-types
          npm run --prefix proto-types build

      - name: Build package dependencies
        run: |
          npm ci --prefix packages/cardano-ibc-planner
          npm run --prefix packages/cardano-ibc-planner build

          npm ci --prefix packages/cardano-ibc-tx-builder --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder build

          npm ci --prefix packages/cardano-ibc-trace-registry --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-trace-registry build

          npm ci --prefix packages/cardano-ibc-tx-builder-runtime --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder-runtime build

      - name: Prune package-local installs for gateway
        run: |
          rm -rf packages/cardano-ibc-planner/node_modules
          rm -rf packages/cardano-ibc-tx-builder-runtime/node_modules
          npm ci --prefix packages/cardano-ibc-tx-builder --omit=dev --legacy-peer-deps
          npm ci --prefix packages/cardano-ibc-trace-registry --omit=dev --legacy-peer-deps

      - name: Install dependencies
        run: npm ci --prefix cardano/gateway --legacy-peer-deps

      - name: Lint
        run: npm run --prefix cardano/gateway lint:check

      - name: Build
        run: npm run --prefix cardano/gateway build

      - name: Test with coverage
        run: npm run --prefix cardano/gateway test:cov:ci

  proto-types:
    name: Proto Types
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: proto-types

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto-types/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  typescript-packages:
    name: TypeScript Packages
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            packages/cardano-ibc-planner/package-lock.json
            packages/cardano-ibc-tx-builder/package-lock.json
            packages/cardano-ibc-trace-registry/package-lock.json
            packages/cardano-ibc-tx-builder-runtime/package-lock.json

      - name: Build planner
        run: |
          npm ci --prefix packages/cardano-ibc-planner
          npm run --prefix packages/cardano-ibc-planner build
          npm test --prefix packages/cardano-ibc-planner

      - name: Build tx builder
        run: |
          npm ci --prefix packages/cardano-ibc-tx-builder --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder build
          npm test --prefix packages/cardano-ibc-tx-builder
          npm prune --omit=dev --prefix packages/cardano-ibc-tx-builder

      - name: Build trace registry
        run: |
          npm ci --prefix packages/cardano-ibc-trace-registry --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-trace-registry build
          npm test --prefix packages/cardano-ibc-trace-registry

      - name: Build tx builder runtime
        run: |
          npm ci --prefix packages/cardano-ibc-tx-builder-runtime --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder-runtime build
          npm test --prefix packages/cardano-ibc-tx-builder-runtime

  deno-offchain:
    name: Cardano Offchain Deno
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Build Aiken blueprint
        working-directory: cardano/onchain
        run: aiken build

      - name: Check formatting
        working-directory: cardano/offchain
        run: deno task fmt:check

      - name: Lint
        working-directory: cardano/offchain
        run: deno task lint

      - name: Type check
        working-directory: cardano/offchain
        run: deno task check

  aiken-static:
    name: Cardano Onchain Aiken Static
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cardano/onchain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Check formatting
        run: aiken fmt --check

      - name: Check fuzz imports stay in tests
        working-directory: .
        run: scripts/ci/check-aiken-fuzz-imports.sh

      - name: Build blueprint
        run: aiken build --deny

      - name: Type check without tests
        run: aiken check --deny --skip-tests

  aiken-smoke:
    name: Cardano Onchain Aiken Smoke
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cardano/onchain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Run smoke test pass
        run: aiken check --deny --max-success 1 --property-coverage relative-to-tests > ../../aiken-smoke.json

  aiken-fuzz:
    name: Cardano Onchain Aiken Fuzz (${{ matrix.suite }})
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cardano/onchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: host-update-client
            match_tests: >-
              -m prop_host_update_client_
          - suite: host-update-connection
            match_tests: >-
              -m prop_host_update_connection_
          - suite: host-update-channel
            match_tests: >-
              -m prop_host_update_channel_
          - suite: host-handle-packet
            match_tests: >-
              -m prop_host_handle_packet_
          - suite: client
            match_tests: >-
              -m ibc/client/ics_007_tendermint_client/client_datum
              -m ibc/client/ics_007_tendermint_client/client_state
              -m ibc/client/ics_007_tendermint_client/misbehaviour_handle
              -m prop_client_update_
          - suite: connection
            match_tests: >-
              -m ibc/core/ics_003_connection_semantics/connection_datum
              -m ibc/core/ics_003_connection_semantics/connection_handshake_contract
              -m prop_conn_open_try_
          - suite: channel-packet
            match_tests: >-
              -m ibc/core/ics_004/channel_datum_test/channel_handshake_contract
              -m ibc/core/ics_004/channel_datum_test/packet_lifecycle_contract
              -m prop_tx_packet_send_
          - suite: transfer-contract
            match_tests: >-
              -m ibc/apps/transfer/transfer_accounting_contract
          - suite: transfer-module
            match_tests: >-
              -m prop_transfer_module_
          - suite: voucher-contract
            match_tests: >-
              -m ibc/apps/transfer/voucher_metadata_contract
          - suite: voucher-policy
            match_tests: >-
              -m prop_voucher_first_mint_
              -m prop_tx_first_seen_voucher_mint_
          - suite: trace-append
            match_tests: >-
              -m prop_trace_registry_append_
          - suite: trace-rollover
            match_tests: >-
              -m prop_trace_registry_rollover_
              -m prop_model_trace_
          - suite: proofs
            match_tests: >-
              -m prop_proof_

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Run fuzz shard
        run: |
          aiken check \
            --deny \
            --max-success 500 \
            --property-coverage relative-to-tests \
            ${{ matrix.match_tests }} \
            > ../../aiken-${{ matrix.suite }}.json

      - name: Upload fuzz report
        uses: actions/upload-artifact@v4
        with:
          name: aiken-fuzz-${{ matrix.suite }}
          path: aiken-${{ matrix.suite }}.json

  aiken:
    name: Cardano Onchain Aiken
    if: ${{ always() && (github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/')) }}
    needs: [aiken-static, aiken-smoke, aiken-fuzz]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check shard status
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node - <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const failed = Object.entries(needs)
            .filter(([, value]) => value.result !== 'success')
            .map(([name, value]) => `${name}: ${value.result}`);
          if (failed.length > 0) {
            console.error(`Aiken shard failure(s): ${failed.join(', ')}`);
            process.exit(1);
          }
          NODE

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download fuzz reports
        uses: actions/download-artifact@v4
        with:
          pattern: aiken-fuzz-*
          path: aiken-fuzz-reports
          merge-multiple: true

      - name: Merge fuzz reports
        run: node scripts/ci/merge-aiken-check-reports.mjs aiken-fuzz-reports aiken-fuzz.json

      - name: Check fuzz label coverage
        run: node scripts/ci/check-aiken-fuzz-coverage.mjs aiken-fuzz.json

  tx-budgets:
    name: Cardano Tx Budgets
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cardano/gateway/package-lock.json

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Build Aiken blueprint
        working-directory: cardano/onchain
        run: aiken build --deny

      - name: Collect Aiken execution units
        working-directory: cardano/onchain
        run: |
          aiken check \
            --deny \
            --plain-numbers \
            --exact-match \
            -m 'ibc/core/ics_003_connection_semantics/connection_datum.{test_is_conn_open_try_valid_succeed}' \
            -m 'spending_transfer_module.{on_chan_open_try_succeed}' \
            -m 'spending_connection.{conn_open_ack_succeed}' \
            -m 'spending_channel.{send_packet_succeed}' \
            -m 'spending_channel/send_packet.{succeed_send_packet}' \
            -m 'spending_channel.{recv_packet_succeed}' \
            -m 'spending_channel/recv_packet.{succeed_recv_packet}' \
            -m 'spending_channel.{acknowledge_packet_succeed}' \
            -m 'spending_channel/acknowledge_packet.{succeed_acknowledge_packet}' \
            -m 'spending_transfer_module.{on_acknowledgement_packet_result_succeed}' \
            -m 'spending_channel.{timeout_packet_succeed}' \
            -m 'spending_channel/timeout_packet.{succeed_timeout_unordered_packet}' \
            -m 'spending_transfer_module.{on_timeout_packet_mint_voucher_succeed}' \
            -m 'trace_registry.{trace_registry_insert_trace_succeeds_with_matching_voucher_mint}' \
            -m 'trace_registry_rollover.{trace_registry_rollover_insert_succeeds_and_preserves_old_shard}' \
            -m 'trace_registry_rollover.{trace_registry_advance_directory_succeeds_for_valid_rollover}' \
            -m 'minting_voucher.{test_mint_voucher}' \
            > ../../aiken-check.json

      - name: Install gateway dependencies
        run: npm ci --prefix cardano/gateway --legacy-peer-deps

      - name: Check transaction size and ex-unit budgets
        env:
          CARDANO_TX_BUDGET_MAX_TX_SIZE: 16384
          CARDANO_TX_BUDGET_HEADROOM_BYTES: 750
          CARDANO_TX_BUDGET_MAX_TX_EX_MEM: 140000000
          CARDANO_TX_BUDGET_MAX_TX_EX_STEPS: 100000000000
          CARDANO_TX_BUDGET_EX_UNIT_HEADROOM_BPS: 500
          CARDANO_TX_BUDGET_AIKEN_CHECK_JSON: ../../aiken-check.json
        run: npm run --prefix cardano/gateway check:tx-budgets

  generated-artifacts:
    name: Generated Artifacts
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto-types/package-lock.json

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Regenerate proto types
        run: |
          npm ci --prefix proto-types
          npm run --prefix proto-types codegen

      - name: Regenerate Aiken blueprint
        working-directory: cardano/onchain
        run: aiken build --deny

      - name: Check generated artifacts
        run: scripts/ci/check-generated-artifacts-clean.sh

  go:
    name: Go (${{ matrix.module.name }})
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        module:
          - name: ibc-go-v10
            path: cosmos/cardano-probabilistic-light-client-v10
          - name: ibc-go-v8
            path: cosmos/cardano-probabilistic-light-client-v8
          - name: core
            path: cosmos/cardano-probabilistic-light-client-core

    defaults:
      run:
        working-directory: ${{ matrix.module.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: ${{ matrix.module.path }}/go.sum

      - name: Test
        env:
          GOWORK: off
        run: go test ./...

      - name: Vet non-generated packages
        env:
          GOWORK: off
        run: |
          mapfile -t packages < <(go list ./... | grep -v '/api/' || true)
          if [ "${#packages[@]}" -gt 0 ]; then
            go vet "${packages[@]}"
          fi

  light-client-parity:
    name: Light Client Parity
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check v8/v10 parity
        run: node scripts/ci/check-light-client-parity.mjs

  rust:
    name: Rust
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
            caribic/target
          key: ${{ runner.os }}-cargo-caribic-${{ hashFiles('caribic/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-caribic-

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: >
          cargo audit --file caribic/Cargo.lock
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0009

      - name: Check formatting
        run: cargo fmt --manifest-path caribic/Cargo.toml -- --check

      - name: Lint
        run: >
          cargo clippy --manifest-path caribic/Cargo.toml --locked --all-targets --
          -D warnings
          -A clippy::manual_is_multiple_of
          -A clippy::too_many_arguments

      - name: Check install build warnings
        run: >
          cargo rustc --manifest-path caribic/Cargo.toml --locked --release
          --bin caribic --
          -D warnings

      - name: Test
        run: cargo test --manifest-path caribic/Cargo.toml --locked

  hermes-relayer:
    name: Hermes Relayer
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'docs/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relayer/target
          key: ${{ runner.os }}-cargo-hermes-relayer-${{ hashFiles('relayer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-hermes-relayer-

      - name: Check formatting
        run: cargo fmt --manifest-path relayer/Cargo.toml --all -- --check

      - name: Lint
        run: cargo clippy --manifest-path relayer/Cargo.toml -p ibc-relayer --lib --tests -- -D warnings

      - name: Test
        run: cargo test --manifest-path relayer/Cargo.toml -p ibc-relayer --lib --locked -- --test-threads=1
