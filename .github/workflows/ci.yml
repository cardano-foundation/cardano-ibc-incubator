name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  npm_config_audit: false
  npm_config_fund: false
  CARGO_TERM_COLOR: always

jobs:
  repo-invariants:
    name: Repository Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check repo invariants
        run: node scripts/ci/check-repo-invariants.mjs

  gateway:
    name: Cardano Gateway
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cardano/gateway/package-lock.json
            proto-types/package-lock.json
            packages/cardano-ibc-planner/package-lock.json
            packages/cardano-ibc-tx-builder/package-lock.json
            packages/cardano-ibc-trace-registry/package-lock.json
            packages/cardano-ibc-tx-builder-runtime/package-lock.json

      - name: Build proto types
        run: |
          npm ci --prefix proto-types
          npm run --prefix proto-types build

      - name: Build package dependencies
        run: |
          npm ci --prefix packages/cardano-ibc-planner
          npm run --prefix packages/cardano-ibc-planner build

          npm ci --prefix packages/cardano-ibc-tx-builder --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder build

          npm ci --prefix packages/cardano-ibc-trace-registry --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-trace-registry build

          npm ci --prefix packages/cardano-ibc-tx-builder-runtime --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder-runtime build

      - name: Prune package-local installs for gateway
        run: |
          rm -rf packages/cardano-ibc-planner/node_modules
          rm -rf packages/cardano-ibc-tx-builder-runtime/node_modules
          npm ci --prefix packages/cardano-ibc-tx-builder --omit=dev --legacy-peer-deps
          npm ci --prefix packages/cardano-ibc-trace-registry --omit=dev --legacy-peer-deps

      - name: Install dependencies
        run: npm ci --prefix cardano/gateway --legacy-peer-deps

      - name: Lint
        run: npm run --prefix cardano/gateway lint:check

      - name: Build
        run: npm run --prefix cardano/gateway build

      - name: Test with coverage
        run: npm run --prefix cardano/gateway test:cov:ci

  proto-types:
    name: Proto Types
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: proto-types

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto-types/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  typescript-packages:
    name: TypeScript Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            packages/cardano-ibc-planner/package-lock.json
            packages/cardano-ibc-tx-builder/package-lock.json
            packages/cardano-ibc-trace-registry/package-lock.json
            packages/cardano-ibc-tx-builder-runtime/package-lock.json

      - name: Build planner
        run: |
          npm ci --prefix packages/cardano-ibc-planner
          npm run --prefix packages/cardano-ibc-planner build

      - name: Build tx builder
        run: |
          npm ci --prefix packages/cardano-ibc-tx-builder --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder build
          npm prune --omit=dev --prefix packages/cardano-ibc-tx-builder

      - name: Build trace registry
        run: |
          npm ci --prefix packages/cardano-ibc-trace-registry --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-trace-registry build

      - name: Build tx builder runtime
        run: |
          npm ci --prefix packages/cardano-ibc-tx-builder-runtime --legacy-peer-deps
          npm run --prefix packages/cardano-ibc-tx-builder-runtime build

  deno-offchain:
    name: Cardano Offchain Deno
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Build Aiken blueprint
        working-directory: cardano/onchain
        run: aiken build

      - name: Check formatting
        working-directory: cardano/offchain
        run: deno task fmt:check

      - name: Lint
        working-directory: cardano/offchain
        run: deno task lint

      - name: Type check
        working-directory: cardano/offchain
        run: deno task check

  aiken:
    name: Cardano Onchain Aiken
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: cardano/onchain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Check formatting
        run: aiken fmt --check

      - name: Check and test
        run: aiken check

  generated-artifacts:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: proto-types/package-lock.json

      - name: Setup Aiken
        uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.21

      - name: Regenerate proto types
        run: |
          npm ci --prefix proto-types
          npm run --prefix proto-types codegen

      - name: Regenerate Aiken blueprint
        working-directory: cardano/onchain
        run: aiken build

      - name: Check generated artifacts
        run: scripts/ci/check-generated-artifacts-clean.sh

  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        module:
          - cosmos/entrypoint
          - cosmos/entrypoint/datasource
          - cosmos/ibcclientest

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.8
          cache-dependency-path: |
            cosmos/entrypoint/go.sum
            cosmos/entrypoint/datasource/go.sum
            cosmos/ibcclientest/go.sum

      - name: Test
        env:
          GOWORK: off
        run: go test ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            caribic/target
          key: ${{ runner.os }}-cargo-caribic-${{ hashFiles('caribic/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-caribic-

      - name: Check formatting
        run: cargo fmt --manifest-path caribic/Cargo.toml -- --check

      - name: Lint
        run: >
          cargo clippy --manifest-path caribic/Cargo.toml --locked --all-targets --
          -D warnings
          -A clippy::manual_is_multiple_of
          -A clippy::too_many_arguments

      - name: Test
        run: cargo test --manifest-path caribic/Cargo.toml --locked
