services:
  cardano-entrypoint-init:
    image: ${CARDANO_ENTRYPOINT_CHAIN_IMAGE:-caribic-cardano-entrypoint-chain:local}
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: [ "/init-cardano-entrypoint.sh" ]
    environment:
      IGNITE_SKIP_PROTO: ${IGNITE_SKIP_PROTO:-1}
      CARDANO_ENTRYPOINT_HOME: ${CARDANO_ENTRYPOINT_HOME:-/root/.cardano-entrypoint-data/node}
    volumes:
      - cardano-entrypoint-home:/root/.cardano-entrypoint-data
    restart: "no"

  cardano-entrypoint-node-prod:
    container_name: cardano-entrypoint-node-prod
    image: ${CARDANO_ENTRYPOINT_CHAIN_IMAGE:-caribic-cardano-entrypoint-chain:local}
    entrypoint: [ "/run-cardano-entrypoint.sh" ]
    environment:
      IGNITE_SKIP_PROTO: ${IGNITE_SKIP_PROTO:-1}
      CARDANO_ENTRYPOINT_HOME: ${CARDANO_ENTRYPOINT_HOME:-/root/.cardano-entrypoint-data/node}
    volumes:
      - cardano-entrypoint-home:/root/.cardano-entrypoint-data
    ports:
      - "26657:26657"
      - "26656:26656"
      - "9090:9090"
      - "127.0.0.1:4500:4500"
      - "1317:1317"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:26657/status | jq -e '.result.sync_info.latest_block_height | tonumber > 0' >/dev/null" ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  cardano-entrypoint-home:
